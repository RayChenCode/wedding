<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Wedding Site Browser Tests</title>
  </head>
  <body>
    <pre id="results">running</pre>
    <iframe id="page" src="../index.html?mockRsvp=success" style="width:390px;height:844px;border:0"></iframe>
    <script>
      const results = [];
      const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
      const assert = (name, condition) => {
        results.push({ name, ok: Boolean(condition) });
        if (!condition) throw new Error(name);
      };

      function click(doc, selector) {
        const node = doc.querySelector(selector);
        node.dispatchEvent(new MouseEvent("click", { bubbles: true }));
      }

      function input(doc, selector, value) {
        const node = doc.querySelector(selector);
        node.value = value;
        node.dispatchEvent(new Event("input", { bubbles: true }));
        node.dispatchEvent(new Event("change", { bubbles: true }));
      }

      async function run() {
        const params = new URLSearchParams(location.search);
        const reportUrl = params.get("report");
        const frame = document.getElementById("page");
        await new Promise((resolve) => frame.addEventListener("load", resolve, { once: true }));
        const win = frame.contentWindow;
        const doc = frame.contentDocument;
        await wait(500);

        assert("site config exposed", Boolean(win.__weddingSite));
        assert("countdown has no NaN", !doc.querySelector("#days").textContent.includes("NaN"));
        assert("carousel active slide exists", doc.querySelectorAll(".slide.is-active").length === 1);
        assert("no horizontal overflow mobile", doc.documentElement.scrollWidth <= doc.documentElement.clientWidth + 1);

        doc.querySelector("#rsvpForm").dispatchEvent(new Event("submit", { bubbles: true, cancelable: true }));
        await wait(200);
        assert("blank form shows name error", doc.querySelector("#nameError").textContent.length > 0);
        assert("blank form shows phone error", doc.querySelector("#phoneError").textContent.length > 0);
        assert("blank attendance keeps guests editable", !doc.querySelector("#guests").disabled);

        input(doc, "#name", "測試 Ray");
        input(doc, "#phone", "abc");
        click(doc, "input[name='ceremony'][value='不出席']");
        click(doc, "input[name='banquet'][value='不出席']");
        doc.querySelector("#rsvpForm").dispatchEvent(new Event("submit", { bubbles: true, cancelable: true }));
        await wait(200);
        assert("bad phone rejected", doc.querySelector("#phoneError").textContent.length > 0);
        assert("not attending sets guests zero", doc.querySelector("#guests").value === "0");

        click(doc, "input[name='ceremony'][value='出席']");
        click(doc, "input[name='banquet'][value='出席']");
        input(doc, "#phone", "0912-345-678");
        input(doc, "#guests", "11");
        doc.querySelector("#rsvpForm").dispatchEvent(new Event("submit", { bubbles: true, cancelable: true }));
        await wait(200);
        assert("too many guests rejected", doc.querySelector("#guestsError").textContent.length > 0);

        input(doc, "#guests", "2");
        input(doc, "#vegetarianCount", "1");
        input(doc, "#childSeatNeed", "需要");
        input(doc, "#childSeatCount", "");
        doc.querySelector("#rsvpForm").dispatchEvent(new Event("submit", { bubbles: true, cancelable: true }));
        await wait(200);
        assert("child seat count required", doc.querySelector("#childSeatCountError").textContent.length > 0);

        input(doc, "#childSeatCount", "1");
        input(doc, "#message", "=測試公式注入 😊");
        doc.querySelector("#rsvpForm").dispatchEvent(new Event("submit", { bubbles: true, cancelable: true }));
        doc.querySelector("#rsvpForm").dispatchEvent(new Event("submit", { bubbles: true, cancelable: true }));
        await wait(900);
        assert("mock success visible", doc.querySelector("#formStatus").textContent.includes("已收到"));
        assert("button re-enabled", !doc.querySelector(".button--submit").disabled);

        document.getElementById("results").textContent = JSON.stringify(results, null, 2);
        if (reportUrl) {
          navigator.sendBeacon(reportUrl, new Blob([JSON.stringify({ ok: true, results })], { type: "application/json" }));
        }
      }

      run().catch((error) => {
        const params = new URLSearchParams(location.search);
        const reportUrl = params.get("report");
        results.push({ name: error.message, ok: false });
        document.getElementById("results").textContent = JSON.stringify(results, null, 2);
        document.body.dataset.failed = "true";
        if (reportUrl) {
          navigator.sendBeacon(reportUrl, new Blob([JSON.stringify({ ok: false, results })], { type: "application/json" }));
        }
      });
    </script>
  </body>
</html>
